# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - app-loic-westeu-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: app-loic-westeu-dev
  AZURE_RESOURCE_GROUP: rg-app-loic-westeu-dev
  AZURE_SUBSCRIPTION_ID: f9caaaca-cbad-4ba6-91b6-306279ab10d2
  TEMP_ACCESS_RULE_NAME: gha-runner-${{ github.run_id }}-${{ github.run_attempt }}
  TEMP_ACCESS_RULE_PRIORITY: 50

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 🛠️ Local Build Section (Optional)
      # The following section in your workflow is designed to catch build issues early on the client side, before deployment. This can be helpful for debugging and validation. However, if this step significantly increases deployment time and early detection is not critical for your workflow, you may remove this section to streamline the deployment process.
      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      # By default, when you enable GitHub CI/CD integration through the Azure portal, the platform automatically sets the SCM_DO_BUILD_DURING_DEPLOYMENT application setting to true. This triggers the use of Oryx, a build engine that handles application compilation and dependency installation (e.g., pip install) directly on the platform during deployment. Hence, we exclude the antenv virtual environment directory from the deployment artifact to reduce the payload size. 
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

      # 🚫 Opting Out of Oryx Build
      # If you prefer to disable the Oryx build process during deployment, follow these steps:
      # 1. Remove the SCM_DO_BUILD_DURING_DEPLOYMENT app setting from your Azure App Service Environment variables.
      # 2. Refer to sample workflows for alternative deployment strategies: https://github.com/Azure/actions-workflow-samples/tree/master/AppService
      

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ env.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Detect GitHub runner public IP
        id: runner-ip
        run: |
          RUNNER_IP="$(curl -fsSL https://api.ipify.org)"
          echo "ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          echo "Detected GitHub runner public IP."

      - name: Add temporary App Service access restrictions
        env:
          RUNNER_IP: ${{ steps.runner-ip.outputs.ip }}
        run: |
          set -euo pipefail

          remove_rule() {
            local target="$1"
            if [ "$target" = "scm" ]; then
              az webapp config access-restriction remove \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$AZURE_WEBAPP_NAME" \
                --rule-name "$TEMP_ACCESS_RULE_NAME" \
                --scm-site true \
                >/dev/null 2>&1 || true
            else
              az webapp config access-restriction remove \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$AZURE_WEBAPP_NAME" \
                --rule-name "$TEMP_ACCESS_RULE_NAME" \
                >/dev/null 2>&1 || true
            fi
          }

          add_rule() {
            local target="$1"
            if [ "$target" = "scm" ]; then
              az webapp config access-restriction add \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$AZURE_WEBAPP_NAME" \
                --rule-name "$TEMP_ACCESS_RULE_NAME" \
                --action Allow \
                --ip-address "${RUNNER_IP}/32" \
                --priority "$TEMP_ACCESS_RULE_PRIORITY" \
                --description "Temporary GitHub Actions runner IP for run ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" \
                --scm-site true
            else
              az webapp config access-restriction add \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$AZURE_WEBAPP_NAME" \
                --rule-name "$TEMP_ACCESS_RULE_NAME" \
                --action Allow \
                --ip-address "${RUNNER_IP}/32" \
                --priority "$TEMP_ACCESS_RULE_PRIORITY" \
                --description "Temporary GitHub Actions runner IP for run ${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
            fi
          }

          remove_rule main
          remove_rule scm
          add_rule main
          add_rule scm

      - name: Wait for SCM access restriction propagation
        env:
          RUNNER_IP: ${{ steps.runner-ip.outputs.ip }}
        run: |
          set -euo pipefail
          echo "Waiting for SCM access restriction to propagate..."
          for i in {1..24}; do
            code="$(curl -k -s -o /dev/null -w "%{http_code}" "https://${AZURE_WEBAPP_NAME}.scm.azurewebsites.net/")"
            echo "Attempt $i: SCM HTTP status $code"
            if [ "$code" != "403" ]; then
              echo "SCM is no longer returning 403."
              exit 0
            fi
            sleep 5
          done
          echo "SCM still returns 403 after waiting."
          exit 1
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'app-loic-westeu-dev'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3B03FD7E8875494AA46A69D475BCFC95 }}

      - name: Remove temporary App Service access restrictions
        if: always()
        run: |
          az webapp config access-restriction remove \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --rule-name "$TEMP_ACCESS_RULE_NAME" \
            >/dev/null 2>&1 || true

          az webapp config access-restriction remove \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --rule-name "$TEMP_ACCESS_RULE_NAME" \
            --scm-site true \
            >/dev/null 2>&1 || true
